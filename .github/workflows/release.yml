name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  check-branch:
    name: Verify tag is on master
    runs-on: ubuntu-latest
    outputs:
      on_master: ${{ steps.check.outputs.on_master }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag commit is reachable from master
        id: check
        run: |
          git fetch origin master
          if git merge-base --is-ancestor "${{ github.sha }}" origin/master; then
            echo "on_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "on_master=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Tag ${{ github.ref_name }} is not on master — skipping release."
          fi

  test:
    name: Test
    needs: check-branch
    if: needs.check-branch.outputs.on_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [check-branch, test]
    if: needs.check-branch.outputs.on_master == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - { goos: linux,   goarch: amd64  }
          - { goos: linux,   goarch: arm64  }
          - { goos: linux,   goarch: arm,   goarm: "7" }
          - { goos: linux,   goarch: "386"  }
          # Windows
          - { goos: windows, goarch: amd64  }
          - { goos: windows, goarch: arm64  }
          - { goos: windows, goarch: "386"  }
          # macOS
          - { goos: darwin,  goarch: amd64  }
          - { goos: darwin,  goarch: arm64  }
          # FreeBSD
          - { goos: freebsd, goarch: amd64  }
          - { goos: freebsd, goarch: arm64  }

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"

          ARCH="${GOARCH}"
          [ -n "$GOARM" ] && ARCH="armv${GOARM}"

          NAME="mikrotik-lists-manager_${GOOS}_${ARCH}${EXT}"

          go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ github.ref_name }} -X main.commit=${{ github.sha }}" \
            -o "dist/${NAME}" \
            ./cmd/main/

      - name: Compress (UPX)
        # UPX не поддерживает darwin arm64 и windows arm64 надёжно
        if: >
          !(matrix.goos == 'darwin') &&
          !(matrix.goos == 'windows' && matrix.goarch == 'arm64') &&
          !(matrix.goos == 'freebsd')
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: dist/*
          args: --best --lzma

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-armv{0}', matrix.goarm) || '' }}
          path: dist/*
          retention-days: 1

  release:
    name: Release
    needs: [check-branch, build]
    if: needs.check-branch.outputs.on_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
